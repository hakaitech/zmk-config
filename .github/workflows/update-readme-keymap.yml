name: Update README keymap

# On every merge/push to master (or main), redraw the keymap SVG and rewrite the
# README to show it, then commit both. The commit carries [skip ci] so it can't
# retrigger this workflow.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redraw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Redraw keymap SVG
        run: |
          keymap parse -z config/corne.keymap > /tmp/corne_keymap.yaml
          keymap draw /tmp/corne_keymap.yaml > corne_keymap.svg

      - name: Rewrite README (keymap + SVG)
        run: |
          cat > README.md <<'EOF'
          # Corne keymap

          ![Corne keymap](corne_keymap.svg)

          <sub>Auto-generated from [`config/corne.keymap`](config/corne.keymap) by [keymap-drawer](https://github.com/caksoylar/keymap-drawer) on every merge to `master`.</sub>
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corne_keymap.svg README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: redraw keymap SVG + README [skip ci]"
            git push
          fi
