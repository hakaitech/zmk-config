---
include:
  # OLED display (built-in SSD1306 from corne shield)
  - board: nice_nano//zmk
    shield: corne_left
    snippet: studio-rpc-usb-uart
  - board: nice_nano//zmk
    shield: corne_right

  # nice!view display (ZMK built-in nice_view shield)
  - board: nice_nano//zmk
    shield: corne_left nice_view_adapter nice_view
    snippet: studio-rpc-usb-uart
  - board: nice_nano//zmk
    shield: corne_right nice_view_adapter nice_view

  - board: nice_nano//zmk
    shield: settings_reset
