# RGB config
CONFIG_ZMK_RGB_UNDERGLOW=y
# Turn off RGB when keyboard enters idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# OLED config — custom display: Monogram (火 + link rune + battery tank)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_VIEW_WIDGET_STATUS=n
CONFIG_CORNE_CUSTOM_DISPLAY=y
# LVGL
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_THEME_MONO=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192
