# ZMK Studio config
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# RGB config
CONFIG_ZMK_RGB_UNDERGLOW=y
# Turn off RGB when keyboard enters idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# OLED config — custom display: Float (boxed layer initial + battery/usb)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_CORNE_CUSTOM_DISPLAY=y
# LVGL
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_THEME_MONO=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192
